# Render Blueprint: static site + CDN rewrite so /api/* is served from the real API (same browser origin → no CORS).
# Apply: Dashboard → Blueprints → connect repo, or paste routes manually on your existing Static Site:
#   Rewrite  /api/*  →  https://backendclientapi.onrender.com/api/*
#   Rewrite  /*      →  /index.html   (SPA fallback; list AFTER /api so API wins)
#
# Alternative: keep a Node Web Service (npm start) — see Corem_Frontend-main/RENDER_DEPLOY.md
services:
  - type: web
    name: coren
    runtime: static
    rootDir: Corem_Frontend-main
    buildCommand: npm install && npm run build
    staticPublishPath: ./Corem_Frontend-main/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://backendclientapi.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
